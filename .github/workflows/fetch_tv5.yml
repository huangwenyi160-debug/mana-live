name: Fetch TV5 Live Source
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install requests
        run: pip install requests
      - name: Fetch TV5 source
        run: |
          python -c "
import requests
import re
url = 'https://live.mana2.my/Tv5'
headers = {'User-Agent': 'Mozilla/5.0'}
res = requests.get(url, headers=headers)
match = re.search(r'https://live\.mana2\.my/Tv5/index\.m3u8\?auth_key=[^\"&]+&token=[^\"&]+', res.text)
if match:
    with open('tv5.txt', 'w') as f:
        f.write(match.group(0))
"
      - name: Commit changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add tv5.txt
          git commit -m "Update TV5 source" || echo "No changes"
          git push
